<!DOCTYPE html>
<html>
<head>
  <title>Secure Panel</title>

  <style>
    body {
      margin: 0;
      background: black;
      font-family: monospace;
      color: red;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }

    .box {
      border: 2px solid red;
      padding: 20px;
      border-radius: 15px;
      width: 300px;
      text-align: center;
      box-shadow: 0 0 20px red;
      transition: 0.2s;
    }

    /* ANIMASI GETAR */
    .shake {
      animation: shake 0.3s;
    }

    @keyframes shake {
      0% { transform: translate(0); }
      25% { transform: translate(-5px, 0); }
      50% { transform: translate(5px, 0); }
      75% { transform: translate(-5px, 0); }
      100% { transform: translate(0); }
    }

    input {
      width: 80%;
      padding: 10px;
      margin: 10px 0;
      background: black;
      border: 1px solid red;
      color: red;
      text-align: center;
      font-size: 18px;
    }

    button {
      background: red;
      color: white;
      border: none;
      padding: 10px 20px;
      border-radius: 10px;
      cursor: pointer;
      margin-top: 10px;
    }

    button:hover {
      background: darkred;
    }

    .status {
      margin-top: 10px;
      font-weight: bold;
    }

    .loading {
      width: 100%;
      height: 10px;
      background: #222;
      margin-top: 10px;
      display: none;
    }

    .bar {
      height: 100%;
      width: 0%;
      background: lime;
    }
  </style>
</head>

<body>

<div class="box" id="box">
  <h1>🔒 Secure Panel</h1>
  <p>Masukkan PIN</p>

  <input type="password" id="pin" placeholder="••••">

  <br>
  <button onclick="cek()">Submit</button>

  <div class="status" id="status"></div>

  <div class="loading" id="loading">
    <div class="bar" id="bar"></div>
  </div>
</div>

<script>
  function cek() {
    let pin = document.getElementById("pin").value;
    let box = document.getElementById("box");
    let status = document.getElementById("status");
    let loading = document.getElementById("loading");
    let bar = document.getElementById("bar");

    status.innerHTML = "";
    loading.style.display = "block";
    bar.style.width = "0%";

    let progress = 0;

    let interval = setInterval(() => {
      progress += 10;
      bar.style.width = progress + "%";

      if (progress >= 100) {
        clearInterval(interval);

        if (pin === "1234") {
          status.style.color = "lime";
          status.innerHTML = "ACCESS GRANTED";
        } else {
          status.style.color = "red";
          status.innerHTML = "ACCESS DENIED";

          box.classList.add("shake");
          setTimeout(() => box.classList.remove("shake"), 300);
        }
      }
    }, 100);
  }
</script>

</body>
</html>
