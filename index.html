<!DOCTYPE html>
<html>
<head>
<title>REDxTOOL</title>

<style>
body {
  margin:0;
  background:black;
  color:#0f0;
  font-family:monospace;
  text-align:center;
  overflow:hidden;
}

/* MATRIX */
canvas {
  position:fixed;
  top:0;
  left:0;
  z-index:-1;
}

/* BOX */
.box {
  margin-top:120px;
  padding:20px;
  border:2px solid #0f0;
  display:inline-block;
  box-shadow:0 0 20px #0f0;
}

/* INPUT */
input {
  padding:10px;
  font-size:18px;
  text-align:center;
  background:black;
  border:1px solid #0f0;
  color:#0f0;
}

/* BUTTON */
button {
  margin-top:10px;
  padding:10px 20px;
  background:#0f0;
  border:none;
  cursor:pointer;
}

/* LOADING */
.loading {
  width:100%;
  height:10px;
  background:#111;
  margin-top:15px;
  border-radius:5px;
  overflow:hidden;
  display:none;
}

.bar {
  width:0%;
  height:100%;
  background:#0f0;
}

/* SHAKE */
.shake {
  animation: shake 0.3s;
}

@keyframes shake {
  0% {transform:translateX(0);}
  25% {transform:translateX(-5px);}
  50% {transform:translateX(5px);}
  75% {transform:translateX(-5px);}
  100% {transform:translateX(0);}
}
</style>

</head>
<body>

<canvas id="matrix"></canvas>

<div class="box" id="box">
<h2>🔒 REDxTOOL</h2>
<p id="statusText">Masukkan PIN untuk akses</p>

<input type="password" id="pin" maxlength="6"><br>
<button onclick="cekPin()">KUNCI PERANGKAT</button>

<div class="loading" id="loading">
  <div class="bar" id="bar"></div>
</div>

</div>

<script>
let pinBenar = "1234";

function cekPin(){
  let pin = document.getElementById("pin").value;
  let box = document.getElementById("box");

  if(pin === pinBenar){
    document.getElementById("statusText").innerHTML = "ACCESS GRANTED...";
    
    document.getElementById("loading").style.display = "block";
    let bar = document.getElementById("bar");
    let width = 0;

    let load = setInterval(()=>{
      width++;
      bar.style.width = width + "%";

      if(width >= 100){
        clearInterval(load);
        window.location.href = "panel.html";
      }
    }, 20);

  } else {
    document.getElementById("statusText").innerHTML = "ACCESS DENIED!";
    
    box.classList.add("shake");
    setTimeout(()=>box.classList.remove("shake"),300);
  }
}

/* MATRIX EFFECT */
const canvas = document.getElementById("matrix");
const ctx = canvas.getContext("2d");

canvas.height = window.innerHeight;
canvas.width = window.innerWidth;

let letters = "01";
letters = letters.split("");

let fontSize = 14;
let columns = canvas.width / fontSize;

let drops = [];
for (let i = 0; i < columns; i++) {
  drops[i] = 1;
}

function draw() {
  ctx.fillStyle = "rgba(0,0,0,0.05)";
  ctx.fillRect(0, 0, canvas.width, canvas.height);

  ctx.fillStyle = "#0F0";
  ctx.font = fontSize + "px monospace";

  for (let i = 0; i < drops.length; i++) {
    let text = letters[Math.floor(Math.random()*letters.length)];
    ctx.fillText(text, i*fontSize, drops[i]*fontSize);

    if (drops[i]*fontSize > canvas.height && Math.random() > 0.95) {
      drops[i] = 0;
    }

    drops[i]++;
  }
}

setInterval(draw, 33);
</script>

</body>
</html>
